<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Your Favourite Music Is Here</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <ul>

            <li class="brand">
                <img src="./assests/spotify_logo.png" alt="">
                Spotify
            </li>

            <li>Home</li>
            <li>About</li>

        </ul>
    </nav>

    <div class="container">

        <div class="songs">

            <h1>Best Telugu Songs</h1>

            <!-- Songs will be generated automatically -->
            <div class="songitemContainer"></div>

        </div>

        <div class="songBanner"></div>

    </div>

    <div class="bottom">

        <input
            type="range"
            name="range"
            id="myprogress"
            min="0"
            value="0"
            max="100">

        <div class="icons">

            <i class="fa-solid fa-3x fa-backward-step"
               id="previous"></i>

            <i class="fa-regular fa-3x fa-circle-play"
               id="masterPlay"></i>

            <i class="fa-solid fa-3x fa-forward-step"
               id="next"></i>

        </div>

        <div class="songInfo">

            <img
                src="./assests/musicwave.gif"
                width="48px"
                alt=""
                id="gif">

            <span id="masterSongName">
                Aaya Sher
            </span>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
